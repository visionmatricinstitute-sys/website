<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#123a63"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00A8FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00A8FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- blueprint grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0,50 H800 M0,100 H800 M0,150 H800 M0,200 H800 M0,250 H800 M0,300 H800 M0,350 H800 M0,400 H800"/>
    <path d="M50,0 V450 M100,0 V450 M150,0 V450 M200,0 V450 M250,0 V450 M300,0 V450 M350,0 V450 M400,0 V450 M450,0 V450 M500,0 V450 M550,0 V450 M600,0 V450 M650,0 V450 M700,0 V450 M750,0 V450"/>
  </g>

  <!-- circuit traces -->
  <g fill="none" stroke="#00A8FF" stroke-width="2.5" stroke-linecap="round" opacity="0.75">
    <path d="M40,380 H200 V300 H340"/>
    <path d="M40,340 H140 V250 H260 V180"/>
    <circle cx="40" cy="380" r="5" fill="#00A8FF"/>
    <circle cx="200" cy="300" r="5" fill="#00A8FF"/>
    <circle cx="340" cy="300" r="5" fill="#00A8FF"/>
    <circle cx="260" cy="180" r="5" fill="#00A8FF"/>
  </g>

  <!-- server rack -->
  <g transform="translate(470,110)">
    <rect x="0" y="0" width="230" height="260" rx="10" fill="#0057D9" opacity="0.18" stroke="#00A8FF" stroke-opacity="0.5"/>
    <g fill="#0057D9" opacity="0.55">
      <rect x="18" y="20" width="194" height="34" rx="4"/>
      <rect x="18" y="66" width="194" height="34" rx="4"/>
      <rect x="18" y="112" width="194" height="34" rx="4"/>
      <rect x="18" y="158" width="194" height="34" rx="4"/>
      <rect x="18" y="204" width="194" height="34" rx="4"/>
    </g>
    <g fill="#00A8FF">
      <circle cx="34" cy="37" r="4"/>
      <circle cx="34" cy="83" r="4"/>
      <circle cx="34" cy="129" r="4"/>
      <circle cx="34" cy="175" r="4"/>
      <circle cx="34" cy="221" r="4"/>
    </g>
  </g>

  <rect x="470" y="110" width="230" height="120" fill="url(#glow)"/>

  <!-- lightning bolt / electrical symbol -->
  <g transform="translate(300,140)">
    <polygon points="60,0 10,90 45,90 30,170 90,60 55,60" fill="#D32F2F" opacity="0.9"/>
  </g>

  <text x="40" y="60" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700" opacity="0.9">
    Electrical Design
  </text>
  <text x="40" y="90" fill="#00A8FF" font-family="Arial, sans-serif" font-size="18" font-weight="600" opacity="0.9">
    Data Center Specialist
  </text>
</svg>
